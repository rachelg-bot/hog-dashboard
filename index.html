<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOG Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #c9a96e;
      --accent-dim: #8a6f3e;
      --text: #f0f0f0;
      --text-muted: #888;
      --green: #4caf7d;
      --yellow: #f0b429;
      --red: #e05252;
      --gray: #444;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    main { padding: 16px; max-width: 600px; margin: 0 auto; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 14px;
      gap: 10px;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .error-box {
      background: #2a1515;
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--red);
      font-size: 14px;
      margin: 20px 0;
    }

    .product-list { display: flex; flex-direction: column; gap: 12px; }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .product-name {
      padding: 14px 16px 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .size-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-top: 1px solid var(--border);
    }

    .size-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background 0.12s;
      position: relative;
    }
    .size-cell:last-child { border-right: none; }
    .size-cell:hover { background: var(--surface2); }
    .size-cell.no-stock { cursor: not-allowed; opacity: 0.45; }
    .size-cell.no-stock:hover { background: none; }

    .size-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .size-qty {
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
    }
    .qty-high { color: var(--green); }
    .qty-med  { color: var(--yellow); }
    .qty-low  { color: var(--red); }
    .qty-zero { color: var(--gray); }

    .size-orders {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 4px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 2px;
      text-align: center;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .modal-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus { border-color: var(--accent); }
    .modal-field input::placeholder { color: var(--text-muted); }

    .modal-info {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .modal-info strong { color: var(--text); }

    .btn-row { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      padding: 12px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); color: #fff; }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 0;
      font-size: 14px;
    }

    .stock-summary {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      flex-wrap: wrap;
    }
    .stock-pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 100px;
      font-weight: 600;
    }
    .pill-total { background: var(--surface2); color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">HALL OF GRAILS</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadInventory()">↻ Refresh</button>
  </div>
  <div class="tabs" id="tabBar"></div>
</header>

<main id="main">
  <div class="loading"><div class="spinner"></div> Loading inventory…</div>
</main>

<!-- Order Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-field">
      <label>ORDER NUMBER</label>
      <input type="text" id="orderInput" placeholder="#001" autocomplete="off"
             onkeydown="if(event.key==='Enter') submitOrder()" />
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">Log Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TABS = ['HOODIES', 'PANTS', 'SET', 'TEE', 'SHORTS'];
  const SIZES = ['XXS', 'XS', 'S', 'M', 'L', 'XL', 'XXL'];

  let allData = {};
  let activeTab = TABS[0];
  let pendingOrder = null;

  // Build tab bar
  const tabBar = document.getElementById('tabBar');
  TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab === activeTab ? ' active' : '');
    btn.textContent = tab;
    btn.onclick = () => switchTab(tab);
    btn.id = `tab-${tab}`;
    tabBar.appendChild(btn);
  });

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    renderTab();
  }

  async function loadInventory() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div> Loading inventory…</div>';
    try {
      const res = await fetch('/api/inventory');
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);
      allData = json.data;
      renderTab();
    } catch (e) {
      document.getElementById('main').innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function renderTab() {
    const products = allData[activeTab] || [];
    const main = document.getElementById('main');

    if (!products.length) {
      main.innerHTML = '<div class="empty">No products found in this tab.</div>';
      return;
    }

    main.innerHTML = '<div class="product-list" id="productList"></div>';
    const list = document.getElementById('productList');

    products.forEach(product => {
      const card = document.createElement('div');
      card.className = 'product-card';

      const totalStock = SIZES.reduce((sum, s) => sum + (product.sizes[s]?.qty || 0), 0);

      card.innerHTML = `
        <div class="product-name">${product.name}</div>
        <div class="stock-summary">
          <span class="stock-pill pill-total">${totalStock} total</span>
        </div>
        <div class="size-grid" id="grid-${product.sheetRow}"></div>
      `;
      list.appendChild(card);

      const grid = card.querySelector(`#grid-${product.sheetRow}`);
      SIZES.forEach(size => {
        const { qty, orders } = product.sizes[size] || { qty: 0, orders: '' };
        const cell = document.createElement('div');
        cell.className = 'size-cell' + (qty === 0 ? ' no-stock' : '');
        cell.dataset.row = product.sheetRow;
        cell.dataset.name = product.name;
        cell.dataset.size = size;
        cell.dataset.qty = qty;

        const qtyClass = qty === 0 ? 'qty-zero' : qty < 3 ? 'qty-low' : qty < 10 ? 'qty-med' : 'qty-high';
        const orderCount = orders ? orders.trim().split(/\s+/).length : 0;

        cell.innerHTML = `
          <span class="size-label">${size}</span>
          <span class="size-qty ${qtyClass}">${qty === 0 ? '—' : qty}</span>
          ${orderCount ? `<span class="size-orders">${orderCount} sold</span>` : ''}
        `;

        if (qty > 0) {
          cell.onclick = () => openModal(product, size, qty);
        }
        grid.appendChild(cell);
      });
    });
  }

  function openModal(product, size, qty) {
    pendingOrder = { tab: activeTab, sheetRow: product.sheetRow, size, productName: product.name };
    document.getElementById('modalTitle').textContent = product.name;
    document.getElementById('modalSubtitle').textContent = `${activeTab} · Size ${size}`;
    document.getElementById('modalInfo').innerHTML =
      `<strong>${qty}</strong> in stock — enter the TikTok order number to log this sale.`;
    document.getElementById('orderInput').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('orderInput').focus(), 50);
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('open');
    pendingOrder = null;
  }

  async function submitOrder() {
    if (!pendingOrder) return;
    const orderNumber = document.getElementById('orderInput').value.trim();
    if (!orderNumber) {
      document.getElementById('orderInput').focus();
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Logging…';
    btn.disabled = true;

    try {
      const res = await fetch('/api/log-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...pendingOrder, orderNumber }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error);

      // Update local data
      const product = allData[pendingOrder.tab].find(p => p.sheetRow === pendingOrder.sheetRow);
      if (product) {
        product.sizes[pendingOrder.size].qty = json.newQty;
        product.sizes[pendingOrder.size].orders = json.newOrders;
      }

      document.getElementById('modalOverlay').classList.remove('open');
      showToast(`✓ ${orderNumber} logged — ${pendingOrder.size} now has ${json.newQty} left`);
      renderTab();
    } catch (e) {
      showToast(`✗ ${e.message}`, true);
    } finally {
      btn.textContent = 'Log Order';
      btn.disabled = false;
      pendingOrder = null;
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Close modal on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
  });

  loadInventory();
</script>
</body>
</html>
